<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TotalLine Garage Door Inspection</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    :root {
      --brand-blue: #0066cc;
      --pass-green: #2e7d32;
      --fail-red: #c62828;
      --na-gray: #9e9e9e;
      --border-light: #e0e0e0;
      --note-border: #bbdefb;
      --bg-light: #fafafa;
      --text-main: #212121;
      --text-muted: #616161;
    }

    .section-title {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--brand-blue);
    margin-bottom: 0.5rem;
    margin-top: 1.5rem;
  }



    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ffffff;
      color: var(--text-main);
    }

    .app {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1rem 2rem;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 0 0.75rem;
      background: #ffffff;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-img {
      height: 52px;
      width: auto;
      object-fit: contain;
      border-radius: 6px;
    }

    .header-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--brand-blue);
    }

    .header-right {
      text-align: right;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .header-divider {
      height: 1px;
      background: var(--border-light);
      margin-bottom: 0.75rem;
    }

    .job-info {
      background: #f9fafc;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1.5rem;
      border: 1px solid #d0d7de;
    }

    .job-header h3 {
      font-size: 1rem;
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 1rem;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 0.75rem 1rem;
      margin-bottom: 1rem;
    }

    .info-grid.three-col {
      grid-template-columns: repeat(3, 1fr);
    }

    .info-grid.two-col {
      grid-template-columns: repeat(2, 1fr);
    }

    .info-field {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .info-label {
      font-size: 0.75rem;
      font-weight: 500;
      color: #374151;
    }

    .info-input {
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 0.4rem 0.6rem;
      font-size: 0.85rem;
      background: #ffffff;
    }

    .section {
      padding: 0.4rem 0 0.4rem;
      border-bottom: 1px solid var(--border-light);
      margin-bottom: 0.4rem;
    }

    .section-band {
      background: #eef6ff;
      border-left: 4px solid #0066cc;
      padding: 0.6rem 0.8rem;
      margin: 1rem 0 0.6rem;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
    }

    .section-band-title,
    .section-status-pill {
      pointer-events: auto;
    }

    .section-band-title {
      font-size: 1rem;
      font-weight: 600;
      color: #003f80;
    }

    .section-status-pill {
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #ffffff;
      background: #9ca3af;
      text-transform: uppercase;
    }

    .section-status-pill.pill-pass {
  background: var(--pass-green);
  color: white;
}

.section-status-pill.pill-fail {
  background: var(--fail-red);
  color: white;
}

.section-status-pill.pill-pending {
  background-color: #a7a9ad !important;
  color: white !important;
}


    .item-row-horizontal {
      display: grid;
      grid-template-columns: 1.2fr 0.9fr 1.2fr;
      gap: 0.75rem;
      padding: 0.6rem 0;
      border-bottom: 1px dashed #e5e7eb;
      align-items: start;
    }

    .item-label {
      font-size: 0.88rem;
    }

    .status-group {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .status-option {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      font-size: 0.78rem;
      color: var(--text-muted);
      cursor: pointer;
    }

    .status-circle {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid #bdbdbd;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      transition: 0.15s;
    }

    .status-circle.pass.selected {
      border-color: var(--pass-green);
      background: var(--pass-green);
    }

    .status-circle.fail.selected {
      border-color: var(--fail-red);
      background: var(--fail-red);
    }

    .status-circle.na.selected {
      border-color: var(--na-gray);
      background: var(--na-gray);
    }

    .status-circle-inner {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ffffff;
    }

    .note-right textarea {
      width: 100%;
      min-height: 40px;
      resize: vertical;
      border-radius: 6px;
      border: 1px solid var(--note-border);
      padding: 0.35rem 0.45rem;
      font-size: 0.82rem;
      background: #f7fbff;
    }

    .signatures {
      margin-top: 1.5rem;
      padding-top: 0.75rem;
      border-top: 2px solid var(--border-light);
    }

    .signatures-title {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .signature-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1rem;
    }

    .signature-block {
      border: 1px solid var(--border-light);
      border-radius: 8px;
      padding: 0.5rem;
      background: var(--bg-light);
    }

    .signature-label {
      font-size: 0.8rem;
      margin-bottom: 0.25rem;
      color: var(--text-muted);
    }

    canvas.signature-pad {
      width: 100%;
      height: 140px;
      border-radius: 6px;
      border: 1px dashed #bdbdbd;
      background: #ffffff;
      touch-action: none;
    }

    .small-btn {
      border: none;
      border-radius: 999px;
      padding: 0.2rem 0.7rem;
      font-size: 0.75rem;
      cursor: pointer;
      background: #e0e0e0;
      color: #424242;
      margin-top: 0.35rem;
    }

    .actions {
      margin-top: 1.5rem;
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
      padding-bottom: 1.5rem;
    }

    .btn {
      border-radius: 999px;
      border: none;
      padding: 0.55rem 1.3rem;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--brand-blue);
      color: #ffffff;
    }

    .btn-secondary {
      background: #eeeeee;
      color: #424242;
    }

    @media (max-width: 600px) {
      .item-row-horizontal {
        grid-template-columns: 1fr;
      }
      .info-grid.three-col,
      .info-grid.two-col {
        grid-template-columns: 1fr;
      }
    }

    .header-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
  }

  .header-company {
    font-size: 14px;
    line-height: 1.2;
    margin-bottom: 6px;
  }

  .company-line {
    font-weight: 500;
  }

.rec-row {
  display: grid;
  grid-template-columns: 1fr 120px 40px;
  gap: 10px;
  margin-bottom: 10px;
  align-items: center;
}

.rec-text {
  width: 100%;
  min-height: 60px;
  padding: 8px;
  font-size: 0.9rem;
  border: 1px solid #ccc;
  border-radius: 6px;
  resize: vertical;
}

.rec-cost {
  width: 100%;
  padding: 8px;
  font-size: 0.9rem;
  border: 1px solid #ccc;
  border-radius: 6px;
}

.rec-remove {
  background: none;
  border: none;
  color: #d11a1a;      /* clean red */
  font-size: 1.2rem;   /* smaller icon */
  cursor: pointer;
  padding: 0;
  line-height: 1;
}

.add-row-btn {
  margin-top: 8px;
  padding: 8px 12px;
  background: var(--brand-blue);
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 0.9rem;
  cursor: pointer;
}

.rec-text,
.rec-cost {
  height: 60px;        /* Forces both fields to match height */
  display: flex;
  align-items: center;
}

.rec-text {
  resize: vertical;    /* Still allows expanding if needed */
}

 /* PAGE BREAK AFTER JOB INFO */
    #jobInfoPage {
      page-break-after: always;
    }

    /* PAGE BREAK BEFORE + AFTER EACH INSPECTION SECTION */
    .inspectionPage {
      page-break-after: always;
    }

  </style>
</head>

<script>
/* ============================================================
   STORAGE
============================================================ */

const STORAGE_KEY = "totalLine_inspection_v1";

function loadState() {
  const raw = localStorage.getItem(STORAGE_KEY);
  return raw ? JSON.parse(raw) : { job:{}, statuses:{}, notes:{} };
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(appState));
}

let appState = loadState();

/* ============================================================
   JOB INFO
============================================================ */

const jobFields = [
  "custName","custStreet","custCity","custZip",
  "custPhone","custEmail",
  "techName","techPhone","techEmail"
];

function loadJobInfo() {
  jobFields.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    if (appState.job[id] !== undefined) el.value = appState.job[id];
  });
}

function bindJobInfo() {
  jobFields.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener("input", () => {
      appState.job[id] = el.value;
      saveState();
    });
  });
}

/* ============================================================
   12‑SECTION CONFIG
============================================================ */

const sectionsConfig = [
  { id:"doorPanels", title:"Door Panels & Appearance", items:[
    "Panel Condition","Dents / Damage","Rust / Corrosion","Window Inserts",
    "Insulation","Bottom Seal","Weatherstripping","General Appearance"
  ]},
  { id:"hardware", title:"Hardware & Fasteners", items:[
    "Hinges","Hinge Pins","Fasteners Tight","Brackets","Struts",
    // Removed: Top Fixtures, Bottom Fixtures
    "General Hardware Condition"
  ]},
  { id:"rollers", title:"Rollers", items:[
    "Roller Condition","Roller Bearings","Roller Shafts","Roller Wear",
    "Roller Noise","Roller Alignment","Lubrication","General Roller Condition"
  ]},
  { id:"tracks", title:"Tracks", items:[
    "Vertical Tracks","Horizontal Tracks","Track Alignment","Track Fasteners",
    "Track Wear","Track Cleanliness","Track Spacing","General Track Condition"
  ]},
  { id:"springs", title:"Springs", items:[
    "Torsion Springs","Extension Springs","Spring Anchor","Spring Cones",
    "Spring Tension","Center Bearing Plate","End Bearing Plates",
    "Shaft Condition","Drums","Cables","General Spring Condition"
  ]},
  { id:"cables", title:"Cables & Pulleys", items:[
    "Cable Condition","Cable Fraying","Cable Drum Wrap","Cable Tension",
    "Pulleys","Pulley Bearings","Pulley Alignment","General Cable Condition"
  ]},
  { id:"weather", title:"Weather Seals & Insulation", items:[
    "Bottom Seal","Side Seals","Top Seal","Panel Insulation",
    // Removed: Thermal Efficiency
    "Air Gaps","Seal Wear","General Weather Seal Condition"
  ]},
  { id:"safety", title:"Safety Features", items:[
    "Photo Eyes","Photo Eye Alignment","Photo Eye Wiring","Auto‑Reverse Test",
    "Force Setting","Emergency Release","Manual Operation",
    // Removed: Safety Labels, UL‑325 Compliance
    "General Safety Condition"
  ]},
  { id:"opener", title:"Opener Unit", items:[
    "Motor Unit","Rail Assembly","Trolley","Belt / Chain","Travel Limits",
    "Force Settings","Light Operation","Cover Condition",
    "General Opener Condition"
    // Removed: Noise Level
  ]},
  { id:"controls", title:"Controls & Connectivity", items:[
    "Wall Console","Remote Controls","Keypad","WiFi Connectivity",
    // Removed: App Control, Battery Backup stays, Wiring Condition removed, Signal Strength removed
    "Battery Backup",
    "General Control Condition","Programming"
  ]},
  { id:"power", title:"Power & Electrical", items:[
    "Power Cord","Outlet Condition","GFCI",
    // Removed: Voltage, Wiring, Conduit, Breaker, General Electrical Condition
  ]},
  { id:"operation", title:"Operational Test", items:[
    "Smooth Operation","Noise Level","Balance Test","Manual Lift",
    "Auto‑Reverse","Full Cycle Test","Open Speed","Close Speed",
    "General Operation"
  ]}
];

/* ============================================================
   BUILD SECTIONS
============================================================ */

function buildSections() {
  const container = document.getElementById("sectionsContainer");
  container.innerHTML = "";

  sectionsConfig.forEach(section => {
    const wrap = document.createElement("div");
    wrap.className = "section-wrapper";
    wrap.dataset.sectionId = section.id;

    const band = document.createElement("div");
    band.className = "section-band";

    const title = document.createElement("div");
    title.className = "section-band-title";
    title.textContent = section.title;

    const pill = document.createElement("div");
    pill.className = "section-status-pill";
    pill.textContent = "Not Started";

    band.appendChild(title);
    band.appendChild(pill);

    const sec = document.createElement("div");
    sec.className = "section";

    section.items.forEach((label, index) => {
      const row = document.createElement("div");
      row.className = "item-row-horizontal";
      row.dataset.sectionId = section.id;
      row.dataset.itemIndex = index;

      const left = document.createElement("div");
      left.className = "item-label";
      left.textContent = label;

      const mid = document.createElement("div");
      mid.className = "status-group";

      ["pass","fail","na"].forEach(type => {
        const opt = document.createElement("div");
        opt.className = "status-option";
        opt.dataset.status = type;

        const circle = document.createElement("div");
        circle.className = `status-circle ${type}`;
        circle.dataset.statusType = type;

        const inner = document.createElement("div");
        inner.className = "status-circle-inner";

        circle.appendChild(inner);
        opt.appendChild(circle);
        opt.append(type.toUpperCase());

        mid.appendChild(opt);
      });

      const right = document.createElement("div");
      right.className = "note-right";

      const note = document.createElement("textarea");
      note.className = "item-note";
      note.placeholder = "Notes...";

      right.appendChild(note);

      row.appendChild(left);
      row.appendChild(mid);
      row.appendChild(right);

      sec.appendChild(row);
    });

    wrap.appendChild(band);
    wrap.appendChild(sec);
// PAGE WRAPPER FOR PAGE BREAKS
const pageWrapper = document.createElement("div");
pageWrapper.className = "inspectionPage";
pageWrapper.appendChild(wrap);
container.appendChild(pageWrapper);
  });
}

/* ============================================================
Format cost field as currency
============================================================ */
document.addEventListener("blur", (e) => {
  if (e.target.classList.contains("rec-cost")) {
    let raw = e.target.value.replace(/[^0-9.]/g, "");

    if (raw === "") {
      e.target.value = "";
      return;
    }

    let num = parseFloat(raw);
    if (!isNaN(num)) {
      e.target.value = num.toLocaleString("en-US", {
        style: "currency",
        currency: "USD"
      });
    }
  }
}, true);

/* ============================================================
   APPLY SAVED STATE
============================================================ */

function applySavedInspectionState() {
  Object.keys(appState.statuses).forEach(key => {
    const { sectionId, index } = JSON.parse(key);
    const row = document.querySelector(
      `.item-row-horizontal[data-section-id="${sectionId}"][data-item-index="${index}"]`
    );
    if (!row) return;

    const status = appState.statuses[key];
    const circle = row.querySelector(`.status-circle.${status}`);
    if (circle) circle.classList.add("selected");
  });

  Object.keys(appState.notes).forEach(key => {
    const { sectionId, index } = JSON.parse(key);
    const row = document.querySelector(
      `.item-row-horizontal[data-section-id="${sectionId}"][data-item-index="${index}"]`
    );
    if (!row) return;

    const note = row.querySelector(".item-note");
    if (note) note.value = appState.notes[key];
  });

  updateSectionPills();
}

/* ============================================================
   INSPECTION EVENTS
============================================================ */

function bindInspectionEvents() {
  document.querySelectorAll(".status-option").forEach(option => {
    option.addEventListener("click", () => {
      const row = option.closest(".item-row-horizontal");
      const sectionId = row.dataset.sectionId;
      const index = parseInt(row.dataset.itemIndex, 10);

      row.querySelectorAll(".status-circle").forEach(c => c.classList.remove("selected"));

      const circle = option.querySelector(".status-circle");
      circle.classList.add("selected");

      const key = JSON.stringify({ sectionId, index });
      appState.statuses[key] = circle.dataset.statusType;
      saveState();

      updateSectionPills();
    });
  });

  document.querySelectorAll(".item-note").forEach(note => {
    note.addEventListener("input", () => {
      const row = note.closest(".item-row-horizontal");
      const sectionId = row.dataset.sectionId;
      const index = parseInt(row.dataset.itemIndex, 10);
      const key = JSON.stringify({ sectionId, index });
      appState.notes[key] = note.value;
      saveState();
    });
  });
}

/* ============================================================
   SECTION PILL LOGIC
============================================================ */

function updateSectionPills() {
  sectionsConfig.forEach(section => {
    const wrap = document.querySelector(`.section-wrapper[data-section-id="${section.id}"]`);
    if (!wrap) return;

    const pill = wrap.querySelector(".section-status-pill");
    const rows = wrap.querySelectorAll(".item-row-horizontal");

    let anyFail = false;
    let anyPass = false;
    let anySet = false;

    rows.forEach(row => {
      const sel = row.querySelector(".status-circle.selected");
      if (!sel) return;

      anySet = true;
      const type = sel.dataset.statusType;

      if (type === "fail") anyFail = true;
      if (type === "pass") anyPass = true;
    });

    // Reset classes
    pill.classList.remove("pill-pass","pill-fail","pill-pending");

    if (!anySet) {
      pill.textContent = "PENDING";
      pill.classList.add("pill-pending");
    } else if (anyFail) {
      pill.textContent = "FAIL";
      pill.classList.add("pill-fail");
    } else if (anyPass) {
      pill.textContent = "PASS";
      pill.classList.add("pill-pass");
    } else {
      pill.textContent = "PENDING";
      pill.classList.add("pill-pending");
    }
  });
}

/* ============================================================
   SIGNATURES
============================================================ */

function initSignaturePads() {
  ["sigTech","sigCust"].forEach(id => {
    const canvas = document.getElementById(id);
    if (!canvas) return;

    const ctx = canvas.getContext("2d");
    let drawing = false;

    canvas.addEventListener("pointerdown", e => {
      drawing = true;
      ctx.beginPath();
      ctx.moveTo(e.offsetX, e.offsetY);
    });

    canvas.addEventListener("pointermove", e => {
      if (!drawing) return;
      ctx.lineTo(e.offsetX, e.offsetY);
      ctx.stroke();
    });

    canvas.addEventListener("pointerup", () => drawing = false);
    canvas.addEventListener("pointerleave", () => drawing = false);
  });

  document.querySelectorAll("[data-clear]").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.getAttribute("data-clear");
      const canvas = document.getElementById(id);
      if (!canvas) return;
      canvas.getContext("2d").clearRect(0, 0, canvas.width, canvas.height);
    });
  });
}

function pdfOptions(filename) {
  return {
    margin: 10,
    filename,
    image: { type: "jpeg", quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true, scrollY: 0 },
    jsPDF: { unit: "pt", format: "letter", orientation: "portrait" },
    pagebreak: { mode: ["css","legacy"] }
  };
}

function buildPdfName() {
  const phone = (document.getElementById("custPhone").value || "")
    .replace(/\D/g,"") || "no-phone";

  const name = (document.getElementById("custName").value || "no-name")
    .trim().replace(/\s+/g,"_");

  const d = new Date();
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const dd = String(d.getDate()).padStart(2,"0");
  const yyyy = d.getFullYear();

  return `${phone}_${name}_${yyyy}${mm}${dd}.pdf`;
}

function openPrefilledEmail(pdfName, to) {
  const cc = "a2zproservices@gmail.com";
  const subject = encodeURIComponent("Garage Door Inspection Report");
  const body = encodeURIComponent(
    "Attached is your inspection report.\n\n" +
    "If the file picker does not open automatically, tap the attachment icon and select:\n" +
    pdfName + "\n\n"
  );

  window.location.href = `mailto:${to}?cc=${cc}&subject=${subject}&body=${body}`;

  const picker = document.getElementById("attachPicker");
  if (picker) setTimeout(() => picker.click(), 800);
}
